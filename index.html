<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncWrite</title>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-left">
                <h1>SyncWrite</h1>
                <p>Bidirectional Rich Text Synchronization</p>
            </div>
            <div class="header-right">
                <span class="status-dot"></span>
                <span class="status-text">Connected</span>
            </div>
        </header>

        <main class="workspace">
            <div class="pane-container">
                <div class="editor-pane" id="pane-frame-a">
                    <div class="pane-header">
                        <span class="pane-title">Frame A</span>
                    </div>
                    <div class="iframe-wrapper">
                        <iframe id="frame-a" name="frame-a" src="editor/editor.html?id=frame-a" title="Frame A"></iframe>
                    </div>
                </div>

                <div class="editor-pane" id="pane-frame-b">
                    <div class="pane-header">
                        <span class="pane-title">Frame B</span>
                    </div>
                    <div class="iframe-wrapper">
                        <iframe id="frame-b" name="frame-b" src="editor/editor.html?id=frame-b" title="Frame B"></iframe>
                    </div>
                </div>
            </div>
        </main>

        <footer class="app-footer">
            <div class="footer-grid">
                <div class="log-panel">
                    <div class="log-header">
                        <h3>Event Log</h3>
                        <button id="clear-logs" class="btn-clear">Clear Logs</button>
                    </div>
                    <div id="log-output" class="log-output">
                        <div class="log-entry system-msg">Ready for sync events...</div>
                    </div>
                </div>

                <div class="stats-panel">
                    <div class="stats-header">
                        <h3>Stats</h3>
                        <button id="reset-stats" class="btn-clear">Reset Stats</button>
                    </div>
                    <div class="stats-content">
                        <div class="stats-cards-grid">
                            <div class="metric-card">
                                <span class="stat-label">Messages Sent</span>
                                <span id="stat-total-sent" class="stat-value">0</span>
                            </div>
                            <div class="metric-card">
                                <span class="stat-label">Messages Received</span>
                                <span id="stat-total-received" class="stat-value">0</span>
                            </div>
                            <div class="metric-card">
                                <span class="stat-label">Frame A Events</span>
                                <span id="stat-from-a" class="stat-value">0</span>
                            </div>
                            <div class="metric-card">
                                <span class="stat-label">Average Latency</span>
                                <span id="stat-avg-latency" class="stat-value">0.0 ms</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </footer>
    </div>
    <script src="host.js"></script>
</body>
</html>
